version: '3.8'

services:
  # --- The Web Dashboard (Node.js) ---
  web-dashboard:
    build: ./web-dashboard
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/safesight
    networks:
      - safesight-network
    depends_on:
      - mongodb

  # --- Database (MongoDB) ---
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - safesight-network

networks:
  safesight-network:
    driver: bridge