version: '3.8'

services:
  # --- The Web Dashboard (Node.js) ---
  web-dashboard:
    build: ./web-dashboard
    ports:
      - "3000:3000"
    networks:
      - safesight-network
    depends_on:
      - mongodb

  # --- The AI Engine (Python + YOLO) ---
  ai-engine:
    build: ./ai-engine
    volumes:
      - /dev/video0:/dev/video0  # Accesses your webcam (Linux/Ubuntu)
    environment:
      - DASHBOARD_URL=http://web-dashboard:3000/api/alert
    networks:
      - safesight-network
    depends_on:
      - web-dashboard

  # --- Database (MongoDB) ---
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - safesight-network

networks:
  safesight-network:
    driver: bridge