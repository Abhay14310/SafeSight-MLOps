services:
  # --- The Web Dashboard (Node.js) ---
  web-dashboard:
    build: ./web-dashboard
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/safesight
      - JWT_SECRET=change-this-to-a-secure-random-secret
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - ALERT_EMAIL_TO=
    env_file:
      - path: ./.env
        required: false   # Optional — won't fail if .env doesn't exist
    networks:
      - safesight-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode===200||r.statusCode===302?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Database (MongoDB) ---
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - safesight-network
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  safesight-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local