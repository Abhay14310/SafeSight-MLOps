# =============================================================================
#  SafeSight-MLOps — CI/CD Pipeline
#  Fixed: 12 issues from audit (see cicd_audit.md)
# =============================================================================
name: SafeSight CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Secret / credential leak scan (fast gate — runs first) ─────────
  detect-secrets:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history needed for gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Lint Node.js backend (web-dashboard) ───────────────────────────
  # FIX #1  Node 18 → 20  (bcrypt ^6, jest ^30 require Node 20)
  # FIX #2  npm ci → npm install --legacy-peer-deps (peer dep conflicts)
  # FIX #6  Removed non-existent db.js from node --check
  lint-backend:
    name: Lint Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20               # FIX #1
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package-lock.json

      - name: Install dependencies            # FIX #2
        run: npm install --legacy-peer-deps

      - name: Check for syntax errors         # FIX #6 — db.js confirmed to exist
        run: node --check script.js db.js mailer.js

      - name: Run Jest tests
        run: npm test -- --passWithNoTests
        env:
          CI: true

  # ── Job 3: Lint Python AI Engine ─────────────────────────────────────────
  lint-ai-engine:
    name: Lint AI Engine (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-engine/requirements.txt

      - name: Install flake8
        run: pip install flake8

      - name: Lint detection.py
        run: |
          flake8 ai-engine/src/detection.py \
            --max-line-length=120 \
            --ignore=E501,W503,E741 \
            --count

  # ── Job 4: TypeScript type-check for all Vite client apps ─────────────────
  # FIX #7 — New job: tsc --noEmit is fast (~10s) vs Docker build (~5 min)
  # FIX #8 — All client lockfiles included in cache-dependency-path
  typecheck-clients:
    name: TypeScript Check — ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: medflow2-client
            dir: medflow2/client
          - name: ecotrack-client
            dir: ecotrack/client
          - name: smartretail-client
            dir: smartretail/client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |            # FIX #8
            medflow2/client/package-lock.json
            ecotrack/client/package-lock.json
            smartretail/client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./${{ matrix.dir }}

      - name: TypeScript type-check           # FIX #7
        run: npx tsc --noEmit
        working-directory: ./${{ matrix.dir }}

  # ── Job 5: Build all Docker images in parallel matrix ─────────────────────
  # FIX #4  — Matrix covers all 8 services, not just web-dashboard
  # FIX #12 — Cache scope is per-service to maximize layer cache hit rate
  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-ai-engine, typecheck-clients]

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web-dashboard
            context: ./web-dashboard
          - service: medflow2-server
            context: ./medflow2/server
          - service: medflow2-client
            context: ./medflow2/client
          - service: ecotrack-server
            context: ./ecotrack/server
          - service: ecotrack-client
            context: ./ecotrack/client
          - service: smartretail-server
            context: ./smartretail/server
          - service: smartretail-client
            context: ./smartretail/client
          - service: ai-engine
            context: ./ai-engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          tags: safesight/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}   # FIX #12
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Job 6: API Smoke Test ─────────────────────────────────────────────────
  # FIX #3  — JSON parsed with jq, not fragile python3 pipe
  # FIX #9  — Server PID tracked; crashes detected; timeout exits with code 1
  smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: [docker-build]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20               # FIX #1
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps                    # FIX #2
        run: npm install --legacy-peer-deps
        working-directory: ./web-dashboard

      - name: Start server in background      # FIX #9 — PID captured
        run: |
          node script.js &
          echo $! > /tmp/server.pid
          echo "Server PID: $(cat /tmp/server.pid)"
        working-directory: ./web-dashboard
        env:
          MONGO_URI: mongodb://localhost:27017/safesight_test
          JWT_SECRET: ci-test-secret-not-for-production
          PORT: 3000

      - name: Wait for server to be ready     # FIX #9 — exits 1 on crash or timeout
        run: |
          SERVER_PID=$(cat /tmp/server.pid)
          for i in $(seq 1 20); do
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "❌ Server process died (PID $SERVER_PID)!"
              exit 1
            fi
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "✅ Server ready after ${i}s"
              exit 0
            fi
            echo "Waiting... attempt $i/20"
            sleep 2
          done
          echo "❌ Server did not become ready in 40s"
          exit 1

      - name: Test /api/register endpoint
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/api/register \
            -H 'Content-Type: application/json' \
            -d '{"username":"ci_user","password":"CIpassword1","displayName":"CI User","organization":"CI Org","tier":"core"}')
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.success == true' || exit 1

      - name: Test /api/login and JWT extraction    # FIX #3 — jq replaces python3 pipe
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/api/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"ci_user","password":"CIpassword1"}')
          echo "$RESPONSE"
          TOKEN=$(echo "$RESPONSE" | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "❌ No JWT token returned"
            exit 1
          fi
          echo "✅ JWT obtained: ${TOKEN:0:20}..."
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Test /api/me with JWT
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/api/me \
            -H "Authorization: Bearer $TOKEN")
          echo "$RESPONSE"
          echo "$RESPONSE" | jq -e '.username == "ci_user"' || exit 1
          echo "✅ /api/me returned correct user"

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi
