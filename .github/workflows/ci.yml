name: SafeSight CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Test Node.js backend ───────────────────────────────
  lint-backend:
    name: Lint Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check script.js db.js mailer.js

  # ── Job 2: Lint Python AI Engine ─────────────────────────────────────
  lint-ai-engine:
    name: Lint AI Engine (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint detection.py
        run: |
          flake8 ai-engine/src/detection.py \
            --max-line-length=120 \
            --ignore=E501,W503,E741 \
            --count

  # ── Job 3: Build Docker Image ─────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web-dashboard image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./web-dashboard
          push: false
          tags: safesight/web-dashboard:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Smoke Test API ─────────────────────────────────────────────
  smoke-test:
    name: API Smoke Test
    runs-on: ubuntu-latest
    needs: [docker-build]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm ci
        working-directory: ./web-dashboard

      - name: Start server in background
        run: node script.js &
        working-directory: ./web-dashboard
        env:
          MONGO_URI: mongodb://localhost:27017/safesight_test
          JWT_SECRET: ci-test-secret-not-for-production
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 && echo "Server ready!" && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Test /api/register endpoint
        run: |
          curl -sf -X POST http://localhost:3000/api/register \
            -H 'Content-Type: application/json' \
            -d '{"username":"ci_user","password":"CIpassword1","displayName":"CI User","organization":"CI Org","tier":"core"}' \
            | grep -q "success"

      - name: Test /api/login endpoint
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:3000/api/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"ci_user","password":"CIpassword1"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "JWT obtained: ${TOKEN:0:20}..."
          curl -sf http://localhost:3000/api/me \
            -H "Authorization: Bearer $TOKEN" \
            | grep -q "username"
