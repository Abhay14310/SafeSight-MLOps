version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: eco-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ecouser
      MONGO_INITDB_ROOT_PASSWORD: ecopass
      MONGO_INITDB_DATABASE: ecotrack
    volumes:
      - eco_mongo_data:/data/db
      - ./server/config/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27019:27017"
    networks:
      - eco-net
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: eco-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5055
      MONGO_URI: mongodb://ecouser:ecopass@eco-mongo:27017/ecotrack?authSource=admin
      JWT_SECRET: ecotrack_jwt_secret_2024
      CLIENT_URL: http://localhost:3008
      TASUKE_URL: http://localhost:3000
    ports:
      - "5055:5055"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - eco_uploads:/app/uploads
    networks:
      - eco-net
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5055/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: eco-client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5055
      VITE_WS_URL: ws://localhost:5055
      VITE_TASUKE_URL: http://localhost:3000
    ports:
      - "3008:80"
    depends_on:
      - server
    networks:
      - eco-net

volumes:
  eco_mongo_data:
  eco_uploads:

networks:
  eco-net:
    driver: bridge
