version: '3.9'

services:
  # ─── MongoDB ─────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: medflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: medflow
      MONGO_INITDB_ROOT_PASSWORD: medflow_secret
      MONGO_INITDB_DATABASE: medflow
    volumes:
      - mongo_data:/data/db
      - ./server/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - medflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API + Socket.io ──────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: medflow-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://medflow:medflow_secret@mongo:27017/medflow?authSource=admin
      JWT_SECRET: medflow_jwt_super_secret_change_in_prod
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - medflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend React/Vite ──────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: medflow-client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_WS_URL: ws://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - medflow-net

volumes:
  mongo_data:
  uploads_data:

networks:
  medflow-net:
    driver: bridge
